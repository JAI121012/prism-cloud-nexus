<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Cloud | Atomic Web Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #b537f2;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; /* Prevents scrolling while playing */
        }

        /* --- HEADER CONTROL BAR --- */
        .game-header {
            position: absolute;
            top: 0;
            width: 100%;
            height: 50px;
            background: rgba(5, 5, 10, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
        }

        .game-title {
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .btn-exit {
            background: transparent;
            color: #ff3c3c;
            border: 1px solid #ff3c3c;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-exit:hover {
            background: #ff3c3c;
            color: #000;
            box-shadow: 0 0 10px #ff3c3c;
        }

        /* --- THE GAME CONTAINER --- */
        .game-container {
            width: 100%;
            height: 100vh; /* Takes up full screen */
            padding-top: 50px; /* Leaves room for header */
            box-sizing: border-box;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- AI BOOT SEQUENCE OVERLAY --- */
        #boot-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020205;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--neon-blue);
            transition: opacity 1s ease;
        }

        .loader {
            width: 100px;
            height: 100px;
            border: 3px solid transparent;
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loader::before {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 3px solid transparent;
            border-top: 3px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 2s linear infinite reverse;
        }

        #boot-text {
            font-family: monospace;
            font-size: 14px;
            color: #0f0;
            text-align: center;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- THE FOUNDER FOOTER --- */
        .founder-footer {
            position: absolute;
            bottom: 5px;
            right: 15px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            letter-spacing: 2px;
            pointer-events: none; /* So it doesn't block mouse clicks in-game */
            z-index: 101;
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="loader"></div>
        <h2 style="font-family: 'Orbitron', sans-serif;">PRISM MIND AI</h2>
        <div id="boot-text">
            > Establishing Atomic Data Link...<br>
            > Bypassing Network Restrictions...<br>
            > Allocating WebAssembly Engine...
        </div>
    </div>

    <div class="game-header">
        <div class="game-title">PRISM CLOUD // UNIVERSAL BRIDGE ACTIVE</div>
        <div>
            <span style="color: #aaa; margin-right: 15px; font-size: 14px;">Ping: <span style="color:#0f0;">1ms</span></span>
            <a href="index.html" class="btn-exit">Disconnect</a>
        </div>
    </div>

    <div class="game-container">
        <iframe src="https://eaglercraft.com/mc/1.21" allowfullscreen="true"></iframe>
    </div>

    <div class="founder-footer">
        JAI // SONIA MAM
    </div>

    <script>
        // Simulates the AI connecting before showing the game
        const bootText = document.getElementById('boot-text');
        const bootScreen = document.getElementById('boot-screen');

        setTimeout(() => { bootText.innerHTML += "<br>> Synced to play.prismcloud.net"; }, 1000);
        setTimeout(() => { bootText.innerHTML += "<br>> Level Skewes Encryption Verified."; }, 2000);
        setTimeout(() => { bootText.innerHTML += "<br>> <strong>ENGINE READY.</strong>"; }, 3000);
        
        // Hide the boot screen and reveal the game
        setTimeout(() => { 
            bootScreen.style.opacity = "0"; 
            setTimeout(() => { bootScreen.style.display = "none"; }, 1000);
        }, 3500);
    </script>

</body>
</html>
